<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVARTAN - Smart Recycling Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        #app-container { display: flex; height: 100vh; flex-direction: column; }
        
        /* Header Toolbar */
        #toolbar { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; position: relative;}
        #toolbar h2 { margin: 0; font-size: 1.2rem; flex-grow: 1; color: #2ecc71;}
        .control-group { display: flex; align-items: center; gap: 10px; }
        select, button { padding: 8px 12px; border-radius: 4px; border: 1px solid #bdc3c7; font-size: 14px; }
        button { background-color: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        
        /* Main Layout */
        #main-content { display: flex; flex-grow: 1; height: calc(100vh - 60px); }
        
        /* Sidebar (Recommendations) */
        #sidebar { width: 350px; background: white; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); padding: 15px; z-index: 1000;}
        .facility-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fff; transition: 0.2s; cursor: pointer; border-left: 5px solid #bdc3c7;}
        .facility-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .facility-card.best-match { border-left-color: #2ecc71; background-color: #f0fdf4;}
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card-title { margin: 0; font-size: 1.1rem; color: #2c3e50; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; background: #e0e0e0; color: #333;}
        .badge.match { background: #d1fae5; color: #065f46; }
        
        .card-stats { display: flex; gap: 15px; font-size: 0.9rem; color: #7f8c8d; margin-top: 10px; }
        .ai-score { margin-top: 10px; font-size: 0.85rem; color: #e67e22; font-weight: bold;}
        
        /* Map Container */
        #map { flex-grow: 1; width: 100%; height: 100%; }
        
        /* Loading Overlay */
        #loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: #34495e; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="toolbar">
        <h2>♻️ AVARTAN Smart Routing</h2>
        <div class="control-group">
            <label for="materialSelect">I want to recycle:</label>
            <select id="materialSelect">
                <option value="general">General Waste</option>
                <option value="plastic" selected>Plastic</option>
                <option value="e-waste">E-Waste</option>
                <option value="metal">Metal</option>
                <option value="paper">Paper / Cardboard</option>
                <option value="glass">Glass</option>
            </select>
            <button onclick="fetchSmartRecommendations()">Find Best Facilities</button>
        </div>
    </div>

    <div id="main-content">
        <div id="sidebar">
            <h3 style="margin-top:0; color:#34495e;">AI Recommendations</h3>
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-top:-10px;">Ranked by distance, rating, and material match.</p>
            <div id="loader">Processing AI Match... ⏳</div>
            <div id="results-list">
                </div>
        </div>
        
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Initialize Map (Centered on Gandhinagar as per your seed data)
    const USER_LAT = 23.2156;
    const USER_LON = 72.6369;
    
    const map = L.map('map').setView([USER_LAT, USER_LON], 12);

    // Add free OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Add User Marker
    const userIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34]
    });
    L.marker([USER_LAT, USER_LON], {icon: userIcon}).addTo(map).bindPopup("<b>Your Location</b>");

    let markersLayer = L.layerGroup().addTo(map);

    // 2. Fetch AI Recommendations from your Zero-Budget Backend
    async function fetchSmartRecommendations() {
        const material = document.getElementById('materialSelect').value;
        const loader = document.getElementById('loader');
        const resultsList = document.getElementById('results-list');
        
        loader.style.display = 'block';
        resultsList.innerHTML = '';
        markersLayer.clearLayers();

        try {
            // Call the endpoint we optimized in Phase 5!
            const response = await fetch(`http://localhost:8000/facilities/nearby?lat=${USER_LAT}&lon=${USER_LON}&material=${material}&limit=10`);
            const json = await response.json();
            
            loader.style.display = 'none';

            if (json.success && json.data.length > 0) {
                renderResults(json.data, material);
            } else {
                resultsList.innerHTML = '<p>No facilities found nearby.</p>';
            }
        } catch (error) {
            loader.style.display = 'none';
            resultsList.innerHTML = '<p style="color:red;">Error connecting to API. Is backend running?</p>';
            console.error("API Error:", error);
        }
    }

    // 3. Render sidebar cards and map markers
    function renderResults(facilities, requestedMaterial) {
        const resultsList = document.getElementById('results-list');
        
        facilities.forEach((fac, index) => {
            // Is it the best match?
            const isBestMatch = index === 0;
            const acceptsMaterial = fac.accepts_material ? "Yes" : "Partial/Unknown";
            
            // 1. Build Sidebar Card
            const card = document.createElement('div');
            card.className = `facility-card ${isBestMatch ? 'best-match' : ''}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <h4 class="card-title">${index + 1}. ${fac.name}</h4>
                    <span class="badge ${fac.accepts_material ? 'match' : ''}">${fac.rating} ⭐</span>
                </div>
                <div class="card-stats">
                    <span>📍 ${fac.distance_km} km away</span>
                    <span>♻️ Accepts: ${acceptsMaterial}</span>
                </div>
                <div class="ai-score">
                    🧠 AI Score: ${fac.score} / 100
                </div>
            `;
            
            // Pan map when card is clicked
            card.onclick = () => {
                map.flyTo([fac.facility_id ? 23.2 : fac.latitude, fac.longitude], 14); // Note: Simplified coordinates for demo. In real app, fetch full details by ID if needed.
            };
            resultsList.appendChild(card);

            // 2. Add Marker to Map
            // Because our simplified AI response currently only sends the ID, distance, and score to save bandwidth,
            // we will need to fetch the full details for the marker, OR just use the index if we modify the AI response.
            // For now, let's assume we can plot them if we add lat/lon back to the AI response. 
            // (If the markers don't appear, ensure `latitude` and `longitude` are included in the `score_and_rank_facilities` return block in `ai_engine.py`)
            
            if(fac.latitude && fac.longitude) {
                 const marker = L.marker([fac.latitude, fac.longitude])
                .bindPopup(`<b>${fac.name}</b><br>AI Score: ${fac.score}<br>${fac.distance_km} km away`);
                markersLayer.addLayer(marker);
            }
        });
        
        // Auto-fit map bounds
        // map.fitBounds(markersLayer.getBounds(), {padding: [50, 50]});
    }

    // Load initially
    window.onload = fetchSmartRecommendations;
</script>

</body>
</html>
